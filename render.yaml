services:
  - type: web
    name: corpus-developerplug
    runtime: node
    plan: starter
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_PATH
        value: /var/data/corpus.sqlite
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: corpus-data
      mountPath: /var/data
      sizeGB: 1
