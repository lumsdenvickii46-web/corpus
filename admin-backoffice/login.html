<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Login | Corpus Finance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/admin/portal.css">
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <h1>Admin Back Office</h1>
      <p>Sign in to manage users, balances, transactions, and requests.</p>
      <div id="flash-message"></div>
      <form action="/admin/login" method="post">
        <div class="form-grid single">
          <div class="form-field"><label>Username</label><input class="input" name="username" required></div>
          <div class="form-field"><label>Password</label><input class="input" type="password" name="password" required></div>
        </div>
        <div class="form-actions"><button class="btn btn-primary" type="submit">Sign In</button></div>
      </form>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const flash = document.getElementById("flash-message");
    const error = params.get("error");
    const success = params.get("success");
    if (error) flash.innerHTML = `<div class="message error">${error}</div>`;
    if (!error && success) flash.innerHTML = `<div class="message success">${success}</div>`;
  </script>
</body>
</html>
